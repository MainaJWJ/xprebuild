<!DOCTYPE html>
<!-- Windows XP 데스크톱 구현 파일 -->
<!-- 이 파일은 Windows XP 운영체제의 데스크톱 환경을 웹에서 재현한 HTML 파일입니다. -->
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows XP Rebuild</title>
    <link rel="stylesheet" href="./fonts/fonts.css">
    <link rel="stylesheet" href="./windowManager.css">
    <link rel="stylesheet" href="./desktop-icons.css">
    <link rel="stylesheet" href="./contextMenu.css">
    <link rel="icon" href="./image/windowslogo.png">

    <!-- ====================================================================== -->
    <!-- CSS 스타일 정의 -->
    <!-- ====================================================================== -->
    <link rel="stylesheet" href="./desktop.css">
    
    <!-- Three.js Library -->
    <script src="app/properties/three.min.js"></script>
    
    <!-- Import Map for Glitch Engine -->
    <script type="importmap">
    {
        "imports": {
            "three": "app/properties/three.min.js",
            "./XPFilterFactory.js": "./app/properties/XPFilterFactory.js",
            "./xp-shaders.js": "./app/properties/xp-shaders.js"
        }
    }
    </script>
    <script type="module" src="app/properties/bg-glitch.js"></script>
</head>

<body id="desktop-body">
    <!-- ====================================================================== -->
    <!-- HTML 구조 정의 -->
    <!-- ====================================================================== -->
    <div id="desktop-wrapper">
        <!-- 데스크톱 영역 -->
        <div id="desktop-area">
            <!-- 아이콘들이 절대 좌표(Absolute Position)로 동적 배치되는 컨테이너 -->
            <div id="desktop-icons"></div>
        </div>

        <!-- 작업표시줄 컨테이너 -->
        <div id="taskbar-container">
            <iframe id="taskbar-frame" src="taskbar.html"></iframe>
        </div>
    </div>

    <!-- Context Menu -->


    <!-- ====================================================================== -->
    <!-- JavaScript 로직 -->
    <!-- ====================================================================== -->
    
    <!-- Clippy 동적 초기화 및 통합 관리자 -->
    <script src="./clippyManager.js"></script>

    <script type="module" src="./appengine.js"></script>
    <script type="module" src="./volumeManager.js"></script>
    <script src="./notification.js"></script>
    <script src="app/properties/crt.js"></script>

</body>

</html>

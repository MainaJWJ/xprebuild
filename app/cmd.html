<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>cmd.exe</title>
    <link rel="stylesheet" href="../fonts/fonts.css">
    <link rel="stylesheet" href="../scroll.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: #c0c0c0;
            font-family: 'Raster', 'Lucida Console', 'Courier New', monospace;
            font-size: 14px;
            height: 100vh;
            overflow: hidden;
            cursor: text;
        }

        #terminal {
            width: 100%;
            height: 100%;
            padding: 4px 6px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #output {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.45;
        }

        #output::-webkit-scrollbar { width: 8px; }
        #output::-webkit-scrollbar-track { background: #000; }
        #output::-webkit-scrollbar-thumb { background: #444; }

        .input-line {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            line-height: 1.45;
        }

        #prompt-span {
            white-space: nowrap;
            flex-shrink: 0;
        }

        #cmd-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #c0c0c0;
            font-family: 'Raster', 'Lucida Console', 'Courier New', monospace;
            font-size: 14px;
            caret-color: #c0c0c0;
            min-width: 0;
        }

        .err  { color: #ff5555; }
        .warn { color: #ffff55; }
        .dim  { color: #808080; }
        .bold { color: #ffffff; }
        .dir-entry { color: #55ffff; }
    </style>
</head>

// ============================================================
// Helpers
// ============================================================
function scrollToBottom() {
    output.scrollTop = output.scrollHeight;
}

function appendLine(text, cls) {
    const span = document.createElement('span');
    if (cls) span.className = cls;
    span.textContent = text + '\n';
    output.appendChild(span);
    scrollToBottom();
}

function appendRaw(html) {
    const div = document.createElement('div');
    div.innerHTML = html;
    output.appendChild(div);
    scrollToBottom();
}

function getPromptStr() {
    let p = promptTemplate;
    p = p.replace(/\$P/gi, currentPath);
    p = p.replace(/\$G/gi, '>');
    p = p.replace(/\$L/gi, '<');
    p = p.replace(/\$B/gi, '|');
    p = p.replace(/\$Q/gi, '=');
    p = p.replace(/\$N/gi, currentDrive.replace(':', ''));
    p = p.replace(/\$_/gi, '\n');
    p = p.replace(/\$\$/gi, '$');
    const d = new Date();
    p = p.replace(/\$D/gi, d.toLocaleDateString('en-US'));
    p = p.replace(/\$T/gi, d.toLocaleTimeString('en-US'));
    return p;
}

function updatePrompt() {
    promptEl.textContent = getPromptStr();
    if (titleOverride) {
        document.title = titleOverride;
    } else {
        document.title = `${currentPath} - cmd.exe`;
    }
}

// ============================================================
// VFS Navigation
// ============================================================
function resolvePath(path, base) {
    if (!path) return base || currentPath;

    // Drive-absolute
    if (/^[A-Z]:\\/i.test(path)) {
        return normalizePath(path);
    }
    // Drive-relative (e.g., C:foo)
    if (/^[A-Z]:/i.test(path)) {
        return normalizePath(path.slice(0, 2) + '\\' + path.slice(2));
    }
    // Absolute from current drive
    if (path.startsWith('\\')) {
        return normalizePath(currentDrive + path);
    }

    // Relative
    const b = base || currentPath;
    return normalizePath(b + '\\' + path);
}

function normalizePath(p) {
    // Collapse separators
    p = p.replace(/\//g, '\\');
    const drive = p.match(/^[A-Z]:/i)?.[0]?.toUpperCase() || '';
    let rest = p.slice(drive.length);
    const parts = rest.split('\\').filter(Boolean);
    const stack = [];
    for (const part of parts) {
        if (part === '.') continue;
        if (part === '..') { stack.pop(); }
        else stack.push(part);
    }
    return drive + '\\' + stack.join('\\');
}

function getVFSNode(path) {
    const norm = normalizePath(path);
    const drive = norm.match(/^([A-Z]:)/i)?.[1]?.toUpperCase();
    if (!drive || !VFS[drive]) return null;

    let node = VFS[drive];
    const rest = norm.slice(drive.length + 1); // strip "C:\"
    if (!rest) return node;

    for (const part of rest.split('\\').filter(Boolean)) {
        if (!node.children) return null;
        const key = Object.keys(node.children).find(k => k.toLowerCase() === part.toLowerCase());
        if (!key) return null;
        node = node.children[key];
    }
    return node;
}

function setVFSNode(path, value) {
    const norm = normalizePath(path);
    const drive = norm.match(/^([A-Z]:)/i)?.[1]?.toUpperCase();
    if (!drive || !VFS[drive]) return false;

    const parts = norm.slice(drive.length + 1).split('\\').filter(Boolean);
    if (parts.length === 0) return false;

    let node = VFS[drive];
    for (let i = 0; i < parts.length - 1; i++) {
        const key = Object.keys(node.children || {}).find(k => k.toLowerCase() === parts[i].toLowerCase());
        if (!key) return false;
        node = node.children[key];
    }
    const last = parts[parts.length - 1];
    if (!node.children) node.children = {};
    if (value === null) {
        const key = Object.keys(node.children).find(k => k.toLowerCase() === last.toLowerCase());
        if (key) delete node.children[key];
    } else {
        node.children[last] = value;
    }
    return true;
}

function formatSize(bytes) {
    return bytes.toLocaleString().padStart(14);
}

function formatDate(dateStr) {
    if (!dateStr) dateStr = new Date().toISOString().slice(0,10);
    const d = new Date(dateStr);
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    const yyyy = d.getFullYear();
    return `${mm}/${dd}/${yyyy}`;
}

    appendLine('');
};

CMDS.cls = function() {
    output.innerHTML = '';
};

CMDS.echo = function(args) {
    if (args.length === 0) {
        appendLine('ECHO is on.');
        return;
    }
    const text = args.join(' ');
    if (text.toLowerCase() === 'on' || text.toLowerCase() === 'off') {
        appendLine(`ECHO is ${text.toLowerCase()}.`);
        return;
    }
    appendLine(text);
};

CMDS.dir = function(args) {
    let target = currentPath;
    let showAll = false;
    const filteredArgs = args.filter(a => {
        if (a === '/a' || a === '/a:h' || a === '/ah') { showAll = true; return false; }
        if (a.startsWith('/')) return false;
        return true;
    });
    if (filteredArgs.length > 0) {
        target = resolvePath(filteredArgs[0]);
    }

    const node = getVFSNode(target);
    if (!node) {
        appendLine(`The system cannot find the path specified.`, 'err');
        return;
    }
    if (node.type === 'file') {
        appendLine(`File Not Found`, 'err');
        return;
    }

    appendLine('');
    appendLine(` Volume in drive C has no label.`);
    appendLine(` Volume Serial Number is 2C9F-4D2A`);
    appendLine('');
    appendLine(` Directory of ${normalizePath(target)}`);
    appendLine('');

    const children = node.children || {};
    let fileCount = 0, dirCount = 0, totalSize = 0;

    const entries = Object.entries(children);
    // Add . and ..
    const now = formatDate(new Date().toISOString().slice(0,10));
    appendLine(`${now}  12:00 PM    <DIR>          .`);
    appendLine(`${now}  12:00 PM    <DIR>          ..`);

    entries.sort(([a, av], [b, bv]) => {
        if (av.type === 'dir' && bv.type !== 'dir') return -1;
        if (av.type !== 'dir' && bv.type === 'dir') return 1;
        return a.localeCompare(b);
    }).forEach(([name, item]) => {
        if (item.hidden && !showAll) return;
        const d = formatDate(item.date || '');
        if (item.type === 'dir') {
            appendLine(`${d}  12:00 PM    <DIR>          ${name}`);
            dirCount++;
        } else {
            const sz = formatSize(item.size || 0);
            appendLine(`${d}  12:00 PM  ${sz} ${name}`);
            fileCount++;
            totalSize += item.size || 0;
        }
    });

    appendLine(`${' '.repeat(15)}${fileCount} File(s)${formatSize(totalSize)} bytes`);
    appendLine(`${' '.repeat(15)}${dirCount} Dir(s)  ${formatSize(1073741824)} bytes free`);
    appendLine('');
};

CMDS.cd = function(args) {
    if (args.length === 0 || args[0] === '/d') {
        if (args[0] === '/d' && args[1]) {
            const newPath = resolvePath(args[1]);
            const node = getVFSNode(newPath);
            if (!node || node.type !== 'dir') {
                appendLine(`The system cannot find the path specified.`, 'err');
                return;
            }
            currentPath = normalizePath(newPath);
            currentDrive = currentPath.match(/^([A-Z]:)/i)?.[1]?.toUpperCase() || currentDrive;
        } else {
            appendLine(currentPath);
        }
        return;
    }

    const target = args[0];
    const newPath = resolvePath(target);
    const node = getVFSNode(newPath);
    if (!node || node.type !== 'dir') {
        appendLine(`The system cannot find the path specified.`, 'err');
        return;
    }
    currentPath = normalizePath(newPath);
};

CMDS.chdir = CMDS.cd;

CMDS.mkdir = function(args) {
    if (args.length === 0) {
        appendLine('The syntax of the command is incorrect.', 'err');
        return;
    }
    const newPath = resolvePath(args[0]);
    const existing = getVFSNode(newPath);
    if (existing) {
        appendLine(`A subdirectory or file ${args[0]} already exists.`, 'err');
        return;
    }
    setVFSNode(newPath, { type: 'dir', children: {}, date: new Date().toISOString().slice(0,10) });
};
CMDS.md = CMDS.mkdir;

CMDS.rmdir = function(args) {
    if (args.length === 0) {
        appendLine('The syntax of the command is incorrect.', 'err');
        return;
    }
    const filteredArgs = args.filter(a => a !== '/s' && a !== '/q');
    const target = resolvePath(filteredArgs[0]);
    const node = getVFSNode(target);
    if (!node) {
        appendLine(`The system cannot find the path specified.`, 'err');
        return;
    }
    if (node.type !== 'dir') {
        appendLine(`The directory name is invalid.`, 'err');
        return;
    }
    if (Object.keys(node.children || {}).length > 0 && !args.includes('/s')) {
        appendLine(`The directory is not empty.`, 'err');
        return;
    }
    setVFSNode(target, null);
};
CMDS.rd = CMDS.rmdir;

CMDS.del = function(args) {
    if (args.length === 0) {
        appendLine('The syntax of the command is incorrect.', 'err');
        return;
    }
    const filteredArgs = args.filter(a => !a.startsWith('/'));
    const target = resolvePath(filteredArgs[0]);
    const node = getVFSNode(target);
    if (!node) {
        appendLine(`Could Not Find ${normalizePath(target)}`, 'err');
        return;
    }
    if (node.type === 'dir') {
        appendLine(`Access is denied.`, 'err');
        return;
    }
    setVFSNode(target, null);
};
CMDS.erase = CMDS.del;

CMDS.copy = function(args) {
    const filtered = args.filter(a => !a.startsWith('/'));
    if (filtered.length < 2) {
        appendLine('The syntax of the command is incorrect.', 'err');
        return;
    }
    const src = resolvePath(filtered[0]);
    const dst = resolvePath(filtered[1]);
    const srcNode = getVFSNode(src);
    if (!srcNode || srcNode.type !== 'file') {
        appendLine(`The system cannot find the file specified.`, 'err');
        return;
    }
    setVFSNode(dst, { ...srcNode, date: new Date().toISOString().slice(0,10) });
    appendLine(`        1 file(s) copied.`);
};

CMDS.move = function(args) {
    const filtered = args.filter(a => !a.startsWith('/'));
    if (filtered.length < 2) {
        appendLine('The syntax of the command is incorrect.', 'err');
        return;
    }
    const src = resolvePath(filtered[0]);
    const srcNode = getVFSNode(src);
    if (!srcNode) {
        appendLine(`The system cannot find the file specified.`, 'err');
        return;
    }
    let dst = resolvePath(filtered[1]);
    const dstNode = getVFSNode(dst);
    if (dstNode && dstNode.type === 'dir') {
        const fileName = src.split('\\').pop();
        dst = normalizePath(dst + '\\' + fileName);
    }
    setVFSNode(dst, srcNode);
    setVFSNode(src, null);
    appendLine(`        1 file(s) moved.`);
};

CMDS.ren = function(args) {
    if (args.length < 2) {
        appendLine('The syntax of the command is incorrect.', 'err');
        return;
    }
    const src = resolvePath(args[0]);
    const srcNode = getVFSNode(src);
    if (!srcNode) {
        appendLine(`The system cannot find the file specified.`, 'err');
        return;
    }
    const parentPath = src.substring(0, src.lastIndexOf('\\'));
    const dst = normalizePath(parentPath + '\\' + args[1]);
    setVFSNode(dst, srcNode);
    setVFSNode(src, null);
};
CMDS.rename = CMDS.ren;

CMDS.type = function(args) {
    if (args.length === 0) {
        appendLine('The syntax of the command is incorrect.', 'err');
        return;
    }
    const target = resolvePath(args[0]);
    const node = getVFSNode(target);
    if (!node || node.type !== 'file') {
        appendLine(`The system cannot find the file specified.`, 'err');
        return;
    }
    if (node.content !== undefined) {
        node.content.split('\n').forEach(l => appendLine(l.replace('\r', '')));
    } else {
        appendLine(`[Binary file - cannot display content]`, 'dim');
    }
};

CMDS.attrib = function(args) {
    const target = resolvePath(args.find(a => !a.startsWith('/') && !a.startsWith('+') && !a.startsWith('-')) || '');
    const node = getVFSNode(target || currentPath);
    if (!node) {
        appendLine(`File not found - ${args[0]}`, 'err');
        return;
    }
    if (node.type === 'dir') {
        appendLine(`           ${normalizePath(target || currentPath)}`);
        return;
    }
    const h = node.hidden ? 'H' : ' ';
    const r = node.readOnly ? 'R' : ' ';
    appendLine(`${r}  ${h}      ${normalizePath(target)}`);
};

CMDS.tree = function(args) {
    const target = args.find(a => !a.startsWith('/')) || currentPath;
    const resolved = resolvePath(target);
    const node = getVFSNode(resolved);
    if (!node || node.type !== 'dir') {
        appendLine(`Invalid path.`, 'err');
        return;
    }
    appendLine(`Folder PATH listing for volume Windows XP`);
    appendLine(`Volume serial number is 2C9F-4D2A`);
    appendLine(normalizePath(resolved));
    renderTree(node, '');
};

function renderTree(node, prefix) {
    if (!node.children) return;
    const entries = Object.entries(node.children)
        .filter(([,v]) => v.type === 'dir')
        .sort(([a],[b]) => a.localeCompare(b));
    entries.forEach(([name, child], i) => {
        const isLast = i === entries.length - 1;
        appendLine(`${prefix}${isLast ? '└───' : '├───'}${name}`);
        renderTree(child, prefix + (isLast ? '    ' : '│   '));
    });
}

CMDS.set = function(args) {
    if (args.length === 0) {
        Object.entries(ENV).sort().forEach(([k,v]) => appendLine(`${k}=${v}`));

    }
    const eq = args[0].indexOf('=');
    if (eq === -1) {
        const key = args[0].toUpperCase();
        const val = Object.entries(ENV).find(([k]) => k.toUpperCase() === key);
        if (val) appendLine(`${val[0]}=${val[1]}`);
        else appendLine(`Environment variable ${args[0]} not defined`, 'err');
    } else {
        const key = args[0].slice(0, eq);
        const val = args[0].slice(eq + 1);
        if (val === '') delete ENV[key];
        else ENV[key] = val;
    }
};

        appendLine('Usage: ping [-t] [-a] [-n count] [-l size] [-f] [-i TTL]', 'err');

        appendLine('            [-k host-list]] [-w timeout] target_name', 'err');
        return;
    }
    const host = args.find(a => !a.startsWith('-')) || args[args.length-1];
    const ip = host === 'localhost' ? '127.0.0.1'
             : host === 'google.com' ? '142.250.207.46'
             : host === '127.0.0.1' ? '127.0.0.1'
             : `192.168.1.${Math.floor(Math.random()*254)+1}`;
    appendLine('');
    appendLine(`Pinging ${host} [${ip}] with 32 bytes of data:`);
    appendLine('');
    const times = [12, 11, 13, 12].map(() => Math.floor(Math.random()*15)+8);
    times.forEach(t => appendLine(`Reply from ${ip}: bytes=32 time=${t}ms TTL=128`));
    appendLine('');
    appendLine(`Ping statistics for ${ip}:`);
    appendLine(`    Packets: Sent = 4, Received = 4, Lost = 0 (0% loss),`);
    appendLine(`Approximate round trip times in milli-seconds:`);
    const min = Math.min(...times), max = Math.max(...times);
    const avg = Math.round(times.reduce((a,b) => a+b, 0)/times.length);
    appendLine(`    Minimum = ${min}ms, Maximum = ${max}ms, Average = ${avg}ms`);
    appendLine('');
};

// ============================================================
// Command Dispatcher
// ============================================================
function dispatch(raw) {
    const trimmed = raw.trim();
    if (!trimmed) return;

    // Echo the command
    appendLine(getPromptStr() + trimmed);

    // Expand env vars %VAR%
    const expanded = trimmed.replace(/%([^%]+)%/g, (_, key) => ENV[key.toUpperCase()] || '');

    // Tokenize (simple)
    const tokens = tokenize(expanded);
    if (!tokens.length) return;

    const cmdName = tokens[0].toLowerCase();
    const args    = tokens.slice(1);

    if (CMDS[cmdName]) {
        try {
            CMDS[cmdName](args);
        } catch(e) {
            appendLine(`An unexpected error occurred.`, 'err');
        }
    } else {
        // Check if it's a drive change (e.g. "D:")
        if (/^[a-z]:$/i.test(cmdName)) {
            const drive = cmdName.toUpperCase();
            if (VFS[drive]) {
                currentDrive = drive;
                currentPath = drive + '\\';
            } else {
                appendLine(`The system cannot find the drive specified.`, 'err');
            }
        } else {
            appendLine(`'${tokens[0]}' is not recognized as an internal or external command,`, 'err');
            appendLine(`operable program or batch file.`, 'err');
        }
    }
    appendLine('');
    updatePrompt();
}

function tokenize(str) {
    const tokens = [];
    let cur = '', inQuote = false;
    for (let i = 0; i < str.length; i++) {
        const ch = str[i];
        if (ch === '"') { inQuote = !inQuote; continue; }
        if (ch === ' ' && !inQuote) {
            if (cur) { tokens.push(cur); cur = ''; }
        } else {
            cur += ch;
        }
    }
    if (cur) tokens.push(cur);
    return tokens;
}

// ============================================================
// Input handling
// ============================================================
input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        const raw = input.value;
        historyBuffer.unshift(raw);
        if (historyBuffer.length > 100) historyBuffer.pop();
        historyIndex = -1;
        input.value = '';
        dispatch(raw);
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (historyIndex < historyBuffer.length - 1) {
            historyIndex++;
            input.value = historyBuffer[historyIndex];
            // Move cursor to end
            setTimeout(() => input.setSelectionRange(input.value.length, input.value.length), 0);
        }
    } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (historyIndex > 0) {
            historyIndex--;
            input.value = historyBuffer[historyIndex];
        } else {
            historyIndex = -1;
            input.value = '';
        }
    } else if (e.key === 'Tab') {
        e.preventDefault();
        handleTabComplete();
    }
});

// Always focus input when clicking terminal
document.getElementById('terminal').addEventListener('click', () => input.focus());

function handleTabComplete() {
    const val = input.value;
    const tokens = tokenize(val);
    if (tokens.length === 0) return;

    // Complete last token as a path
    const last = tokens[tokens.length - 1] || '';
    const dirPart = last.lastIndexOf('\\') >= 0
        ? last.substring(0, last.lastIndexOf('\\') + 1)
        : '';
    const filePart = last.substring(dirPart.length).toLowerCase();

    const searchIn = resolvePath(dirPart || currentPath);
    const node = getVFSNode(searchIn);
    if (!node || !node.children) return;

    const matches = Object.keys(node.children).filter(k => k.toLowerCase().startsWith(filePart));
    if (matches.length === 1) {
        tokens[tokens.length - 1] = dirPart + matches[0];
        input.value = tokens.join(' ');
    } else if (matches.length > 1) {
        appendLine(getPromptStr() + val);
        appendLine(matches.join('    '));
        appendLine('');
    }
}

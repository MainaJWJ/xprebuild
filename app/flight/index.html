<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Flight Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-layer">
        <main id="world"></main>
    </div>

    <!-- Include Three.js and required loaders -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <!-- Include our custom modules -->
    <script src="myShipControl.js"></script>
    <script src="uiManager.js"></script>

    <script type="module">
        // --- 1. 기본 구성 요소 생성 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f0); // 약간 회색빛 도는 흰색
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0xf0f0f0, 1);
        renderer.shadowMap.enabled = true; // 그림자 활성화
        renderer.autoClear = false;
        document.getElementById('world').appendChild(renderer.domElement);

        // --- 2. 조명 및 바닥 추가 ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(1000, 2000, 1000);
        dirLight.castShadow = true;
        // 그림자 범위 설정
        dirLight.shadow.camera.left = -5000;
        dirLight.shadow.camera.right = 5000;
        dirLight.shadow.camera.top = 5000;
        dirLight.shadow.camera.bottom = -5000;
        scene.add(dirLight);

        // 바닥 평면 (그리드 포함) - 더 어둡게 수정
        const gridHelper = new THREE.GridHelper(400000, 1000, 0x444444, 0x222222);
        gridHelper.position.y = 0;
        scene.add(gridHelper);

        const planeGeom = new THREE.PlaneGeometry(400000, 400000);
        const planeMat = new THREE.MeshPhongMaterial({ color: 0x111111, side: THREE.DoubleSide });
        const plane = new THREE.Mesh(planeGeom, planeMat);
        plane.rotation.x = Math.PI / 2;
        plane.position.y = -0.1;
        plane.receiveShadow = true;
        scene.add(plane);

        // --- 3. 초기화 및 제어 설정 ---
        const clock = new THREE.Clock();
        let cameraMode = 'follow';
        document.addEventListener('keydown', (event) => {
            if (event.key === 'b' || event.key === 'B') {
                cameraMode = cameraMode === 'follow' ? 'rear_view' : 'follow';
            }
        });

        async function init() {
            // UI 관리자 초기화
            if (window.initUIManager) window.initUIManager();

            // 우주선 컨트롤러 초기화
            await initMyShipControl(scene, camera);
            console.log("Spaceship controller initialized.");

            if (window.spawnSpaceship) window.spawnSpaceship();

            // Gizmo(축 방향 표시기) 초기화
            const gizmoScene = new THREE.Scene();
            const gizmoCamera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);

            const originObj = new THREE.Vector3(0, 0, 0);
            const arrowX = new THREE.ArrowHelper(new THREE.Vector3(1, 0, 0), originObj, 20, 0xff0000, 6, 4);
            const arrowY = new THREE.ArrowHelper(new THREE.Vector3(0, 1, 0), originObj, 20, 0x00ff00, 6, 4);
            const arrowZ = new THREE.ArrowHelper(new THREE.Vector3(0, 0, 1), originObj, 20, 0x0000ff, 6, 4);
            gizmoScene.add(arrowX, arrowY, arrowZ);

            const hc = document.getElementById('hud-container') || document.body;
            const createLbl = (txt, color) => {
                const el = document.createElement('div');
                el.innerText = txt;
                el.style.position = 'absolute';
                el.style.color = color;
                el.style.fontWeight = 'bold';
                el.style.fontFamily = 'Arial';
                el.style.fontSize = '14px';
                el.style.pointerEvents = 'none';
                el.style.zIndex = '1000';
                hc.appendChild(el);
                return el;
            };
            const lblX = createLbl('X', '#ff5555');
            const lblY = createLbl('Y', '#55ff55');
            const lblZ = createLbl('Z', '#5555ff');

            function animate() {
                requestAnimationFrame(animate);
                const delta = clock.getDelta();

                // 시뮬레이션 업데이트
                if (window.updateTrails) window.updateTrails(delta);
                if (window.updateSpaceship) window.updateSpaceship(delta, camera, cameraMode);
                if (window.updateSpaceshipAnimation) window.updateSpaceshipAnimation(delta);

                // HUD 렌더
                if (window.updateHUD && typeof spaceship !== 'undefined' && !spaceship.frozen) {
                    window.updateHUD(spaceship);
                }

                // 메인 렌더링
                renderer.clear();
                renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);
                renderer.render(scene, camera);

                // Gizmo 렌더링
                if (typeof spaceship !== 'undefined' && !spaceship.frozen) {
                    const gizmoSize = 120;
                    const pad = 20;
                    renderer.clearDepth();
                    renderer.setViewport(pad, window.innerHeight - gizmoSize - pad, gizmoSize, gizmoSize);

                    gizmoCamera.position.set(0, 0, 1).applyQuaternion(camera.quaternion).multiplyScalar(50);
                    gizmoCamera.up.copy(camera.up);
                    gizmoCamera.lookAt(0, 0, 0);
                    renderer.render(gizmoScene, gizmoCamera);

                    const pX = new THREE.Vector3(25, 0, 0).project(gizmoCamera);
                    const pY = new THREE.Vector3(0, 25, 0).project(gizmoCamera);
                    const pZ = new THREE.Vector3(0, 0, 25).project(gizmoCamera);

                    const cx = pad + gizmoSize / 2;
                    const cy = pad + gizmoSize / 2;
                    lblX.style.left = (cx + pX.x * gizmoSize / 2) + 'px';
                    lblX.style.top = (cy - pX.y * gizmoSize / 2) + 'px';
                    lblY.style.left = (cx + pY.x * gizmoSize / 2) + 'px';
                    lblY.style.top = (cy - pY.y * gizmoSize / 2) + 'px';
                    lblZ.style.left = (cx + pZ.x * gizmoSize / 2) + 'px';
                    lblZ.style.top = (cy - pZ.y * gizmoSize / 2) + 'px';
                    lblX.style.display = lblY.style.display = lblZ.style.display = 'block';
                } else {
                    lblX.style.display = lblY.style.display = lblZ.style.display = 'none';
                }
            }
            animate();
        }

        init();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>

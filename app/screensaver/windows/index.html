<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screensaver - Windows</title>
    <style>
        /* screensaver.css */
        #screensaver {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
            cursor: none;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <script>
        // screensavers.js
        let screensaverInterval = null;

        function createScreensaverContainer() {
            let ss = document.getElementById('screensaver');
            if (ss) ss.remove();
            ss = document.createElement('div');
            ss.id = 'screensaver';
            Object.assign(ss.style, { position: 'relative', width: '100%', height: '100%', overflow: 'hidden', background: '#000' });
            document.body.appendChild(ss);
            return ss;
        }

        const screensavers = {
            windows: () => {
                const ss = createScreensaverContainer();
                const rect = ss.getBoundingClientRect();
                const width = rect.width;
                const height = rect.height;
                const scale = Math.min(width / 1024, height / 768);
                const img = Object.assign(document.createElement('img'), {
                    // Adjusted path for app/windows/index.html location
                    src: './logo.png',
                    style: 'position:absolute;'
                });
                ss.appendChild(img);
                img.width = Math.max(300 * scale, 1);
                img.height = Math.max(200 * scale, 1);
                let dx = 3 * scale, dy = 2 * scale;
                img.style.left = (width - img.width) / 2 + 'px';
                img.style.top = (height - img.height) / 2 + 'px';
                screensaverInterval = setInterval(() => {
                    let x = parseFloat(img.style.left) + dx;
                    let y = parseFloat(img.style.top) + dy;
                    if (x <= 0 || x + img.width >= width) dx *= -1;
                    if (y <= 0 || y + img.height >= height) dy *= -1;
                    img.style.left = x + 'px';
                    img.style.top = y + 'px';
                }, 16);
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            if (screensavers.windows) {
                screensavers.windows();
            }
        });

        // ===== 화면보호기 종료 기능 추가 =====
        function exitAndClose() {
            // 부모 창이 있으면 종료 메시지 전송
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ type: 'exitFullscreenApp' }, '*');
            }
        }

        var screensaverFirstEvent = false;
        var screensaverReady = false;
        function handleScreensaverExit() {
            if (!screensaverReady) return; // 준비 안 됐으면 무시
            if (!screensaverFirstEvent) {
                screensaverFirstEvent = true;
                exitAndClose();
            }
        }

        window.addEventListener('mousemove', handleScreensaverExit);
        window.addEventListener('mousedown', handleScreensaverExit);
        window.addEventListener('keydown', handleScreensaverExit);
        window.addEventListener('touchstart', handleScreensaverExit);

        window.addEventListener('DOMContentLoaded', function () {
            setTimeout(() => { screensaverReady = true; }, 700); // 0.7초 후부터 입력 감지
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screensaver - Mystify</title>
    <style>
        /* screensaver.css */
        #screensaver {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
            cursor: none;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <script>
        // screensavers.js
        let screensaverInterval = null;

        function createScreensaverContainer() {
            let ss = document.getElementById('screensaver');
            if (ss) ss.remove();
            ss = document.createElement('div');
            ss.id = 'screensaver';
            Object.assign(ss.style, { position: 'relative', width: '100%', height: '100%', overflow: 'hidden', background: '#000' });
            document.body.appendChild(ss);
            return ss;
        }

        function createCanvas() {
            const container = document.getElementById('screensaver');
            const rect = container.getBoundingClientRect();
            const c = document.createElement('canvas');
            c.width = rect.width;
            c.height = rect.height;
            Object.assign(c.style, { width: '100%', height: '100%' });
            container.appendChild(c);
            return c;
        }

        const screensavers = {
            mystify: () => {
                createScreensaverContainer();
                const ss = createCanvas();
                const ctx = ss.getContext('2d');
                const width = ss.width;
                const height = ss.height;
                const scale = Math.min(width / 1024, height / 768);
                const lines = Array.from({ length: 6 }, () => ({ x: Math.random() * width, y: Math.random() * height, dx: (Math.random() - 0.5) * 4 * scale, dy: (Math.random() - 0.5) * 4 * scale }));
                screensaverInterval = setInterval(() => {
                    ctx.fillStyle = 'rgba(0,0,0,0.1)';
                    ctx.fillRect(0, 0, width, height);
                    ctx.strokeStyle = '#fff';
                    ctx.beginPath();
                    lines.forEach((l, i) => {
                        l.x += l.dx; l.y += l.dy;
                        if (l.x < 0 || l.x > width) l.dx *= -1;
                        if (l.y < 0 || l.y > height) l.dy *= -1;
                        const next = lines[(i + 1) % lines.length];
                        ctx.moveTo(l.x, l.y);
                        ctx.lineTo(next.x, next.y);
                    });
                    ctx.stroke();
                }, 50);
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            if (screensavers.mystify) {
                screensavers.mystify();
            }
        });

        // ===== 화면보호기 종료 기능 추가 =====
        function exitAndClose() {
            // 부모 창이 있으면 종료 메시지 전송
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ type: 'exitFullscreenApp' }, '*');
            }
        }

        var screensaverFirstEvent = false;
        var screensaverReady = false;
        function handleScreensaverExit() {
            if (!screensaverReady) return; // 준비 안 됐으면 무시
            if (!screensaverFirstEvent) {
                screensaverFirstEvent = true;
                exitAndClose();
            }
        }

        window.addEventListener('mousemove', handleScreensaverExit);
        window.addEventListener('mousedown', handleScreensaverExit);
        window.addEventListener('keydown', handleScreensaverExit);
        window.addEventListener('touchstart', handleScreensaverExit);

        window.addEventListener('DOMContentLoaded', function () {
            setTimeout(() => { screensaverReady = true; }, 700); // 0.7초 후부터 입력 감지
        });
    </script>
</body>

</html>

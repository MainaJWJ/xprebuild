<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screensaver - Windows</title>
    <style>
        /* screensaver.css */
        #screensaver {
            margin: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
            cursor: none;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
        }

        .bouncer {
            position: absolute;
            /* filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3)); */
            transition: transform 0.1s linear;
            will-change: transform, left, top;
        }
    </style>
</head>

<body>
    <div id="screensaver"></div>
    <script>
        // screensavers.js
        let screensaverAnimationFrame = null;
        const bouncers = [];

        class Bouncer {
            constructor(container, src, width, height) {
                this.container = container;
                this.element = document.createElement('img');
                this.element.src = src;
                this.element.className = 'bouncer';
                this.width = width;
                this.height = height;
                this.element.style.width = width + 'px';
                this.element.style.height = height + 'px';
                
                const rect = container.getBoundingClientRect();
                this.maxX = rect.width - width;
                this.maxY = rect.height - height;
                
                // Random start position
                this.x = Math.random() * this.maxX;
                this.y = Math.random() * this.maxY;
                
                // Random velocity
                const speedScale = Math.min(rect.width / 1024, rect.height / 768);
                this.dx = (Math.random() * 3 + 3) * (Math.random() < 0.5 ? 1 : -1) * speedScale;
                this.dy = (Math.random() * 3 + 3) * (Math.random() < 0.5 ? 1 : -1) * speedScale;
                
                container.appendChild(this.element);
                this.updatePosition();
            }

            update(width, height) {
                this.maxX = width - this.width;
                this.maxY = height - this.height;

                this.x += this.dx;
                this.y += this.dy;

                if (this.x <= 0) {
                    this.x = 0;
                    this.dx *= -1;
                } else if (this.x >= this.maxX) {
                    this.x = this.maxX;
                    this.dx *= -1;
                }

                if (this.y <= 0) {
                    this.y = 0;
                    this.dy *= -1;
                } else if (this.y >= this.maxY) {
                    this.y = this.maxY;
                    this.dy *= -1;
                }

                this.updatePosition();
            }

            updatePosition() {
                this.element.style.left = this.x + 'px';
                this.element.style.top = this.y + 'px';
            }
        }

        const screensavers = {
            windows: () => {
                const ss = document.getElementById('screensaver');
                const rect = ss.getBoundingClientRect();
                const scale = Math.min(rect.width / 1024, rect.height / 768);
                
                const configs = [
                    { src: './smile3.gif', count: 4, w: 150, h: 150 },
                    { src: './smile2.gif', count: 3, w: 180, h: 180 },
                    { src: './smile1.gif', count: 2, w: 200, h: 200 }
                ];

                configs.forEach(config => {
                    for (let i = 0; i < config.count; i++) {
                        bouncers.push(new Bouncer(ss, config.src, config.w * scale, config.h * scale));
                    }
                });

                function animate() {
                    const currentRect = ss.getBoundingClientRect();
                    bouncers.forEach(b => b.update(currentRect.width, currentRect.height));
                    screensaverAnimationFrame = requestAnimationFrame(animate);
                }
                
                animate();
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            if (screensavers.windows) {
                screensavers.windows();
            }
        });

        // ===== 화면보호기 종료 기능 추가 =====
        function exitAndClose() {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ type: 'exitFullscreenApp' }, '*');
            }
        }

        let screensaverFirstEvent = false;
        let screensaverReady = false;
        function handleScreensaverExit() {
            if (!screensaverReady) return;
            if (!screensaverFirstEvent) {
                screensaverFirstEvent = true;
                if (screensaverAnimationFrame) cancelAnimationFrame(screensaverAnimationFrame);
                exitAndClose();
            }
        }

        window.addEventListener('mousemove', handleScreensaverExit);
        window.addEventListener('mousedown', handleScreensaverExit);
        window.addEventListener('keydown', handleScreensaverExit);
        window.addEventListener('touchstart', handleScreensaverExit);

        window.addEventListener('DOMContentLoaded', function () {
            setTimeout(() => { screensaverReady = true; }, 700);
        });
    </script>
</body>

</html>
